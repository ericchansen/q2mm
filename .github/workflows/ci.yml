name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ---- Fast: lint + core tests (no backends, ~30s) ----
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff check q2mm/ test/ scripts/
      - run: python -m ruff format --check q2mm test scripts examples

  test-core:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -m "not (openmm or tinker or jax or psi4)" -q

  # ---- Backend tests (parallel, using pre-built container images) ----
  # Images are published by the "Build CI Images" workflow (build-images.yml)
  # to ghcr.io/ericchansen/q2mm/ci-<backend>:latest.
  # Rebuild images when backend versions change (a few times per year).

  test-openmm:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ericchansen/q2mm/ci-openmm:latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: pip install -e . --no-deps && pytest -m openmm --run-slow -q

  test-tinker:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ericchansen/q2mm/ci-tinker:latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: pip install -e . --no-deps && pytest -m tinker --run-slow -q

  test-jax:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ericchansen/q2mm/ci-jax:latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: pip install -e . --no-deps && pytest -m jax --run-slow -q

  test-psi4:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ericchansen/q2mm/ci-psi4:latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: pip install -e . --no-deps && pytest -m psi4 --run-slow -q

  test-cross-backend:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ericchansen/q2mm/ci-full:latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: pip install -e . --no-deps && pytest --run-slow -q
