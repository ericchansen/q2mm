name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Weekly slow/benchmark run — Sundays at 04:00 UTC
    - cron: "0 4 * * 0"

jobs:
  # ================================================================
  # Tier 1 — Fast feedback on every push and PR (~30s)
  # ================================================================
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff check q2mm/ test/ scripts/
      - run: python -m ruff format --check q2mm test scripts examples

  test-core:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -m "not (openmm or tinker or jax or jax_md or psi4)" -q

  # ================================================================
  # Tier 2 — Backend tests on PRs + master merges (parallel, 2-10 min)
  # Gated behind Tier 1 so lint/core failures are caught first.
  # Images: ghcr.io/ericchansen/q2mm/ci-<backend>:latest
  # ================================================================
  test-openmm:
    needs: [lint, test-core]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/ericchansen/q2mm/ci-openmm:latest
      options: --user root
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - run: python -m pip install -e . --no-deps && python -m pytest -m openmm --run-slow -q

  test-tinker:
    needs: [lint, test-core]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/ericchansen/q2mm/ci-tinker:latest
      options: --user root
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - run: python -m pip install -e . --no-deps && python -m pytest -m tinker --run-slow -q

  test-jax:
    needs: [lint, test-core]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/ericchansen/q2mm/ci-jax:latest
      options: --user root
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - run: python -m pip install -e . --no-deps && python -m pytest -m jax --run-slow -q

  test-jax-md:
    needs: [lint, test-core]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/ericchansen/q2mm/ci-jax-md:latest
      options: --user root
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - run: python -m pip install -e . --no-deps && python -c "import jax_md" && python -m pytest -m jax_md --run-slow -q

  test-psi4:
    needs: [lint, test-core]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/ericchansen/q2mm/ci-psi4:latest
      options: --user root
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - run: python -m pip install -e . --no-deps && python -m pytest -m psi4 --run-slow -q

  test-cross-backend:
    needs: [lint, test-core]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/ericchansen/q2mm/ci-full:latest
      options: --user root
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - run: python -m pip install -e . --no-deps && python -m pytest --run-slow -q
