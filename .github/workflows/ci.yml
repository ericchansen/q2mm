name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ---- Fast: lint + core tests (no backends, ~30s) ----
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff check q2mm/ test/ scripts/
      - run: python -m ruff format --check q2mm test scripts examples

  test-core:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -m "not (openmm or tinker or jax or psi4)" -q

  # ---- Backend tests (parallel, each ~5 min) ----
  # These use micromamba to install conda-forge backends.
  # Once ghcr.io images are built, switch to container: directives for speed.

  test-openmm:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: .github/envs/openmm.yml
          cache-environment: true
      - shell: micromamba-shell {0}
        run: pip install -e . --no-deps && pytest -m openmm --run-slow -q

  test-tinker:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: .github/envs/tinker.yml
          cache-environment: true
      - shell: micromamba-shell {0}
        run: pip install -e . --no-deps && pytest -m tinker --run-slow -q

  test-jax:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: .github/envs/jax.yml
          cache-environment: true
      - shell: micromamba-shell {0}
        run: pip install -e . --no-deps && pytest -m jax --run-slow -q

  test-psi4:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: .github/envs/psi4.yml
          cache-environment: true
      - shell: micromamba-shell {0}
        run: pip install -e . --no-deps && pytest -m psi4 --run-slow -q

  test-cross-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: .github/envs/full.yml
          cache-environment: true
      - shell: micromamba-shell {0}
        run: pip install -e . --no-deps && pytest --run-slow -q
