name: Build CI Images

on:
  push:
    branches: [master]
    paths:
      - ".github/envs/**"
      - ".github/docker/**"
  workflow_dispatch:

permissions:
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        backend:
          - { name: openmm, env: openmm.yml }
          - { name: tinker, env: tinker.yml }
          - { name: jax,    env: jax.yml    }
          - { name: psi4,   env: psi4.yml   }
          - { name: full,   env: full.yml   }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/docker/Dockerfile
          build-args: ENV_FILE=${{ matrix.backend.env }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ci-${{ matrix.backend.name }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ci-${{ matrix.backend.name }}:${{ github.sha }}
