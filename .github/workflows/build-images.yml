name: Build CI Images

# Manual-only — run when you bump backend versions (a few times a year).
# Select a specific backend or rebuild all.

on:
  workflow_dispatch:
    inputs:
      backend:
        description: "Backend to rebuild (or 'all')"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - openmm
          - tinker
          - jax
          - jax-md
          - psi4
          - full

permissions:
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        backend:
          - { name: openmm, env: openmm.yml }
          - { name: tinker, env: tinker.yml }
          - { name: jax,    env: jax.yml    }
          - { name: jax-md, env: jax-md.yml }
          - { name: psi4,   env: psi4.yml   }
          - { name: full,   env: full.yml   }
    steps:
      - name: Check if selected
        id: check
        run: |
          if [[ "${{ inputs.backend }}" != "all" && "${{ inputs.backend }}" != "${{ matrix.backend.name }}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - if: steps.check.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - if: steps.check.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/docker/Dockerfile
          build-args: ENV_FILE=${{ matrix.backend.env }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ci-${{ matrix.backend.name }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ci-${{ matrix.backend.name }}:${{ github.sha }}
