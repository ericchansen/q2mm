site_name: Q2MM
site_url: https://ericchansen.github.io/q2mm/
site_description: Quantum-guided molecular mechanics force field optimization
repo_url: https://github.com/ericchansen/q2mm
repo_name: ericchansen/q2mm

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Tutorial: tutorial.md
  - Data Types: data-types.md
  - Optimization Guide: optimization-guide.md
  - API Overview: api.md
  - API Reference:
    - reference/index.md
    - Models:
      - ForceField: reference/models/forcefield.md
      - Molecule: reference/models/molecule.md
      - I/O: reference/models/ff_io.md
      - Seminario: reference/models/seminario.md
      - Hessian: reference/models/hessian.md
      - Units: reference/models/units.md
    - Backends:
      - Base: reference/backends/base.md
      - OpenMM: reference/backends/openmm.md
      - Tinker: reference/backends/tinker.md
      - JAX: reference/backends/jax.md
      - Psi4: reference/backends/psi4.md
    - Optimizers:
      - Objective: reference/optimizers/objective.md
      - SciPy: reference/optimizers/scipy_opt.md
      - Cycling: reference/optimizers/cycling.md
      - Scoring: reference/optimizers/scoring.md
    - Parsers:
      - Gaussian: reference/parsers/gaussian.md
      - AMBER: reference/parsers/amber_ff.md
      - MM3: reference/parsers/mm3.md
      - Tinker: reference/parsers/tinker_ff.md
      - Jaguar: reference/parsers/jaguar.md
    - Diagnostics:
      - Benchmark: reference/diagnostics/benchmark.md
      - PES Distortion: reference/diagnostics/pes_distortion.md
      - Report: reference/diagnostics/report.md
    - Constants: reference/constants.md
  - Benchmarks:
    - Overview: benchmarks/index.md
    - Small Molecules: benchmarks/small-molecules.md
    - Rh-Enamide (Jaguar): benchmarks/rh-enamide-jaguar.md
    - Rh-Enamide (Psi4): benchmarks/rh-enamide-psi4.md
  - References: references.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            merge_init_into_class: true
            show_signature_annotations: true
            separate_signature: true
            signature_crossrefs: true
