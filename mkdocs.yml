site_name: Q2MM
site_url: https://ericchansen.github.io/q2mm/
site_description: Quantum-guided molecular mechanics force field optimization
repo_url: https://github.com/ericchansen/q2mm
repo_name: ericchansen/q2mm

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.top
    - toc.follow

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Tutorial: tutorial.md
  - Data Types: data-types.md
  - Backend Engines: backends.md
  - Optimization Guide: optimization-guide.md
  - API Overview: api.md
  - Benchmarks:
    - Overview: benchmarks/index.md
    - Small Molecules: benchmarks/small-molecules.md
    - Rh-Enamide (Jaguar): benchmarks/rh-enamide-jaguar.md
    - Rh-Enamide (Psi4): benchmarks/rh-enamide-psi4.md
  - API Reference: reference/
  - References: references.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - gen-files:
      scripts:
        - scripts/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            merge_init_into_class: true
            show_signature_annotations: true
            separate_signature: true
            signature_crossrefs: true
